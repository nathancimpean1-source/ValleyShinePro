<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Valley Shine Pro">
<meta name="theme-color" content="#061525">
<title>Valley Shine Pro — Bid Builder</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #061525;
  --navy2:     #0c2340;
  --navy3:     #0f2d52;
  --cyan:      #00d4f5;
  --cyan2:     #00b8d9;
  --cyan-dim:  rgba(0,212,245,0.15);
  --cyan-glow: rgba(0,212,245,0.3);
  --blue:      #1a6fc4;
  --white:     #ffffff;
  --silver:    #c8d8e8;
  --muted:     #6a8aaa;
  --card-bg:   rgba(255,255,255,0.05);
  --card-bdr:  rgba(0,212,245,0.18);
  --text:      #e8f4ff;
  --on:        #00d4f5;
  --gold:      #f5c842;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{
  font-family:'Barlow',sans-serif;
  background:var(--navy);
  color:var(--text);
  display:flex;flex-direction:column;
  height:100vh;height:-webkit-fill-available;
}

/* ── HEADER ── */
.hdr{
  flex-shrink:0;
  background:linear-gradient(180deg,var(--navy2) 0%,var(--navy) 100%);
  border-bottom:1px solid rgba(0,212,245,0.25);
  position:relative;overflow:hidden;
}
.hdr-swoosh{
  position:absolute;bottom:-1px;left:0;right:0;height:3px;
  background:linear-gradient(90deg,transparent 0%,var(--cyan) 30%,var(--cyan2) 70%,transparent 100%);
}
.hdr-inner{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 14px 10px;
}
.logo-wrap img{height:54px;width:auto;display:block;filter:drop-shadow(0 2px 12px rgba(0,212,245,0.4));}
.hdr-right{text-align:right;}
.inv-chip{
  display:inline-block;
  background:var(--cyan);color:var(--navy);
  font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;letter-spacing:.5px;
  padding:4px 11px;border-radius:20px;margin-bottom:3px;
  box-shadow:0 0 12px var(--cyan-glow);
}
.hdr-date{font-size:11px;color:var(--muted);}

/* ── SCROLL BODY ── */
.body{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;background:var(--navy);}
.body::-webkit-scrollbar{width:3px;}
.body::-webkit-scrollbar-track{background:transparent;}
.body::-webkit-scrollbar-thumb{background:var(--cyan-dim);border-radius:2px;}

/* ── SECTION HEADS ── */
.sec{padding:14px 13px 0;}
.sec-label{
  font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;color:var(--cyan);
  display:flex;align-items:center;gap:8px;margin-bottom:10px;
}
.sec-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--cyan-dim),transparent);}

/* ── GLASS CARDS ── */
.glass{
  background:var(--card-bg);
  border:1px solid var(--card-bdr);
  border-radius:14px;
  backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,0.3),inset 0 1px 0 rgba(255,255,255,0.06);
}

/* ── CLIENT CARD ── */
.client-card{padding:13px;margin-bottom:14px;}
.client-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.client-grid .full{grid-column:1/-1;}
.field label{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:4px;}
.field input,.field textarea{
  width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(0,212,245,0.2);
  border-radius:9px;padding:9px 11px;
  font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.field input:focus,.field textarea:focus{
  border-color:var(--cyan);
  box-shadow:0 0 0 3px var(--cyan-dim);
  background:rgba(0,0,0,0.4);
}
.field textarea{resize:none;height:50px;}
.inv-row{display:flex;gap:10px;margin-bottom:14px;}
.inv-row .field{flex:1;}
.inv-row input{
  width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(0,212,245,0.2);
  border-radius:9px;padding:9px 11px;
  font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);outline:none;
  transition:border-color .2s;
}
.inv-row input:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim);}

/* ── SERVICE CARDS ── */
.svcs{display:flex;flex-direction:column;gap:9px;margin-bottom:14px;}
.svc{border-radius:13px;overflow:hidden;border:1px solid rgba(0,212,245,0.12);background:rgba(255,255,255,0.03);transition:border-color .2s,background .2s;}
.svc.on{border-color:rgba(0,212,245,0.5);background:rgba(0,212,245,0.06);}
.svc-top{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;cursor:pointer;user-select:none;}
.svc-left{display:flex;align-items:center;gap:10px;}
.svc-ico{
  width:36px;height:36px;border-radius:9px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;
  transition:background .2s,border-color .2s;
}
.svc.on .svc-ico{background:var(--cyan-dim);border-color:rgba(0,212,245,0.4);}
.svc-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text);line-height:1;}
.svc-unit{font-size:11px;color:var(--muted);margin-top:2px;}
.svc-right{display:flex;align-items:center;gap:10px;}
.svc-amt{
  font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800;
  color:var(--muted);min-width:62px;text-align:right;transition:color .2s;
}
.svc.on .svc-amt{color:var(--cyan);}

/* Toggle */
.tog{width:46px;height:26px;border-radius:13px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);cursor:pointer;position:relative;transition:background .2s,border-color .2s;flex-shrink:0;}
.tog.on{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 10px var(--cyan-glow);}
.tog::after{content:'';position:absolute;width:20px;height:20px;border-radius:50%;background:white;top:2px;left:2px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.tog.on::after{left:22px;}

/* Service body */
.svc-body{padding:0 13px 13px;border-top:1px solid rgba(0,212,245,0.1);}
.svc-body-inner{padding-top:11px;}
.price-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:9px;}
.price-wrap{display:flex;align-items:center;gap:5px;}
.dollar{font-size:15px;color:var(--cyan);font-weight:700;}
.price-input{
  width:90px;background:rgba(0,0,0,0.3);border:1px solid rgba(0,212,245,0.25);
  border-radius:8px;padding:8px 8px;
  font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;
  color:var(--text);text-align:right;outline:none;
  transition:border-color .2s;
}
.price-input:focus{border-color:var(--cyan);box-shadow:0 0 0 2px var(--cyan-dim);}
.unit-pill{
  font-size:11px;color:var(--cyan);background:var(--cyan-dim);
  border:1px solid rgba(0,212,245,0.25);
  border-radius:20px;padding:3px 9px;font-weight:700;letter-spacing:.3px;
}
.ctr{display:flex;align-items:center;gap:0;margin-left:auto;}
.cb{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  font-size:20px;font-weight:700;color:var(--text);
  cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;
  transition:all .1s;
}
.cb:active{transform:scale(.87);}
.cb.plus{background:var(--cyan);color:var(--navy);border-color:var(--cyan);box-shadow:0 0 8px var(--cyan-glow);}
.cb.plus:active{background:var(--cyan2);}
.cv{
  font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:800;
  color:var(--text);min-width:46px;text-align:center;
}
.svc-note{
  width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(0,212,245,0.15);
  border-radius:8px;padding:7px 10px;
  font-family:'Barlow',sans-serif;font-size:13px;color:var(--silver);
  resize:none;height:40px;outline:none;
}
.svc-note:focus{border-color:var(--cyan);}
::placeholder{color:rgba(106,138,170,0.6);}

/* ── NOTES SECTION ── */
.notes-card{padding:12px;margin-bottom:14px;}
.notes-card textarea{
  width:100%;background:rgba(0,0,0,0.25);border:1px solid rgba(0,212,245,0.2);
  border-radius:9px;padding:9px 11px;
  font-family:'Barlow',sans-serif;font-size:14px;color:var(--text);
  resize:none;height:60px;outline:none;
}
.notes-card textarea:focus{border-color:var(--cyan);box-shadow:0 0 0 3px var(--cyan-dim);}

/* ── FOOTER ── */
.footer{
  flex-shrink:0;
  background:linear-gradient(0deg,var(--navy2) 0%,var(--navy) 100%);
  border-top:1px solid rgba(0,212,245,0.25);
  padding:11px 13px 12px;
  position:relative;
}
.footer-swoosh{
  position:absolute;top:-1px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--cyan) 40%,var(--cyan2) 60%,transparent);
}
.total-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;}
.total-lbl{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
.total-amt{
  font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;
  color:var(--cyan);line-height:1;
  text-shadow:0 0 20px rgba(0,212,245,0.5);
  font-style:italic;
}
.btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.btn{
  border:none;border-radius:10px;padding:10px 4px;
  font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;
  letter-spacing:.5px;text-transform:uppercase;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:transform .1s,opacity .1s;
}
.btn:active{transform:scale(.93);opacity:.85;}
.btn .ico{font-size:17px;}
.btn-sms{background:linear-gradient(135deg,#1db954,#25D366);color:white;box-shadow:0 3px 12px rgba(37,211,102,.3);}
.btn-email{background:linear-gradient(135deg,#1553a0,#1a6fc4);color:white;box-shadow:0 3px 12px rgba(26,111,196,.3);}
.btn-pdf{background:linear-gradient(135deg,var(--cyan2),var(--cyan));color:var(--navy);box-shadow:0 3px 12px var(--cyan-glow);}
.btn-clear{background:rgba(255,255,255,0.06);color:var(--muted);border:1px solid rgba(255,255,255,0.1);grid-column:1/-1;padding:7px;font-size:11px;}

/* Custom name */
.cname-input{
  border:none;border-bottom:1.5px solid var(--cyan);
  background:transparent;
  font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:var(--text);
  width:130px;outline:none;padding:0 0 2px;
}

@media(max-width:380px){.client-grid{grid-template-columns:1fr;}}
</style>
</head>

let S={};
SVCS.forEach(s=>S[s.id]={on:false,price:s.price,cnt:s.cnt});

function lt(id){
  const s=SVCS.find(x=>x.id===id),st=S[id];
  return s.ctr?(st.price*st.cnt):st.price;
}

function build(){
  const el=document.getElementById('svcList');
  el.innerHTML='';
  SVCS.forEach(s=>{
    const st=S[s.id];
    const d=document.createElement('div');
    d.className='svc'+(st.on?' on':'');
    d.id='sc-'+s.id;
    const nm=s.custom
      ?'<input class="cname-input" id="cn-'+s.id+'" value="'+(st.label||'Custom Service')+'" placeholder="Service name" onchange="S[\''+s.id+'\'].label=this.value">'
      :'<div class="svc-name">'+s.name+'</div>';
    const ctrHtml=s.ctr
      ?'<div class="ctr"><button class="cb" ontouchstart="" onclick="adj(\''+s.id+'\',-1)">−</button><div class="cv" id="cv-'+s.id+'">'+st.cnt+'</div><button class="cb plus" ontouchstart="" onclick="adj(\''+s.id+'\',1)">+</button></div>'
      :'';
    d.innerHTML=
      '<div class="svc-top" onclick="tog(\''+s.id+'\')">'+
        '<div class="svc-left">'+
          '<div class="svc-ico">'+s.ico+'</div>'+
          '<div><div style="display:flex;align-items:center;gap:0;">'+nm+'</div><div class="svc-unit">'+s.unitFull+'</div></div>'+
        '</div>'+
        '<div class="svc-right">'+
          '<div class="svc-amt" id="la-'+s.id+'">$'+lt(s.id).toFixed(2)+'</div>'+
          '<button class="tog'+(st.on?' on':'')+'" id="tg-'+s.id+'" onclick="event.stopPropagation();tog(\''+s.id+'\')"></button>'+
        '</div>'+
      '</div>'+
      '<div class="svc-body" id="sb-'+s.id+'" style="'+(st.on?'':'display:none')+'">'+
        '<div class="svc-body-inner">'+
          '<div class="price-row">'+
            '<div class="price-wrap"><span class="dollar">$</span><input class="price-input" id="pi-'+s.id+'" type="number" min="0" step="0.01" value="'+st.price+'" onchange="setPrice(\''+s.id+'\',this.value)"><span class="unit-pill">'+s.unit+'</span></div>'+
            ctrHtml+
          '</div>'+
          '<textarea class="svc-note" id="nt-'+s.id+'" placeholder="Notes for this line item..."></textarea>'+
        '</div>'+
      '</div>';
    el.appendChild(d);
  });
  recalc();
}

function tog(id){
  S[id].on=!S[id].on;
  const c=document.getElementById('sc-'+id);
  const t=document.getElementById('tg-'+id);
  const b=document.getElementById('sb-'+id);
  c.className='svc'+(S[id].on?' on':'');
  t.className='tog'+(S[id].on?' on':'');
  b.style.display=S[id].on?'':'none';
  recalc();
}
function adj(id,d){
  S[id].cnt=Math.max(0,S[id].cnt+d);
  document.getElementById('cv-'+id).textContent=S[id].cnt;
  document.getElementById('la-'+id).textContent='$'+lt(id).toFixed(2);
  recalc();
}
function setPrice(id,v){
  S[id].price=parseFloat(v)||0;
  document.getElementById('la-'+id).textContent='$'+lt(id).toFixed(2);
  recalc();
}
function recalc(){
  let t=0;SVCS.forEach(s=>{if(S[s.id].on)t+=lt(s.id);});
  document.getElementById('grandTotal').textContent='$'+t.toFixed(2);
}
function active(){
  return SVCS.filter(s=>S[s.id].on).map(s=>{
    const st=S[s.id],nm=(s.custom&&st.label)?st.label:s.name;
    const qty=s.ctr?st.cnt:1;
    const note=(document.getElementById('nt-'+s.id)||{}).value||'';
    return{name:nm,unit:s.unitFull,qty,price:st.price,line:lt(s.id),note};
  });
}
function summary(){
  const client=document.getElementById('c-name').value||'Client';
  const addr=document.getElementById('c-addr').value||'';
  const num=document.getElementById('inv-num').value||'1001';
  const svcs=active();let total=0;
  const lines=svcs.map(s=>{total+=s.line;return '• '+s.name+(s.qty>1?' x'+s.qty:'')+': $'+s.line.toFixed(2)+(s.note?' ('+s.note+')':'');}).join('\n');
  return{client,addr,num,lines,total};
}

  const ph=document.getElementById('c-phone').value.replace(/\D/g,'');

}

  '.stripe{height:5px;background:linear-gradient(90deg,#061525 0%,#00d4f5 50%,#1a6fc4 100%);margin:18px 0;}'+
  '.bill{background:#f0f6ff;border-left:4px solid #00d4f5;border-radius:0 10px 10px 0;padding:14px 18px;margin-bottom:24px;}'+
  '.bill .lbl{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#00b8d9;margin-bottom:5px;}'+
  '.bill .nm{font-size:19px;font-weight:700;color:#061525;}'+
  '.bill .det{font-size:13px;color:#6a8aaa;line-height:1.9;margin-top:3px;}'+
  'table{width:100%;border-collapse:collapse;margin-bottom:22px;}'+
  'thead tr{background:#061525;}'+
  'thead th{font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:white;padding:10px 12px;text-align:left;}'+
  'thead th:nth-child(n+3){text-align:right;}'+
  'tbody tr{border-bottom:1px solid #e0eaf5;}'+
  'tbody tr:nth-child(even){background:#f7faff;}'+
  'tbody td{padding:10px 12px;font-size:14px;vertical-align:top;}'+
  'tbody td:nth-child(n+3){text-align:right;}'+
  '.tot-wrap{display:flex;justify-content:flex-end;margin-bottom:22px;}'+
  '.tot-box{background:#061525;border-radius:12px;padding:16px 24px;text-align:right;}'+
  '.tot-lbl{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,0.5);}'+
  '.tot-amt{font-family:"Barlow Condensed",sans-serif;font-size:40px;font-weight:900;color:#00d4f5;line-height:1;margin-top:3px;font-style:italic;}'+
  '.note-sec{font-size:13px;color:#6a8aaa;border-top:1px solid #e0eaf5;padding-top:14px;margin-bottom:22px;}'+
  '.foot{text-align:center;font-size:12px;color:#9aacb8;border-top:2px solid #e0eaf5;padding-top:14px;}'+
  '@media print{body{} .page{padding:20px;}}</style></head><body>'+
  '<div class="page">'+
  '<div class="hdr"><img class="logo" src="'+LOGO+'" alt="Valley Shine Pro"><div class="inv-right"><div class="word">Invoice</div><div class="num">#'+num+'</div><div class="dt">'+dt+'</div></div></div>'+
  '<div class="stripe"></div>'+
  '<div class="bill"><div class="lbl">Bill to</div><div class="nm">'+client+'</div><div class="det">'+(addr?addr+'<br>':'')+(cph?'Phone: '+cph+'<br>':'')+(cem?cem:'')+'</div></div>'+
  '<table><thead><tr><th>Service</th><th>Unit</th><th style="text-align:right">Qty</th><th style="text-align:right">Unit Price</th><th style="text-align:right">Total</th></tr></thead><tbody>'+rows+'</tbody></table>'+
  '<div class="tot-wrap"><div class="tot-box"><div class="tot-lbl">Total due</div><div class="tot-amt">$'+total.toFixed(2)+'</div></div></div>'+
  (notes?'<div class="note-sec"><strong>Notes:</strong> '+notes+'</div>':'')+
  '<div class="foot">Valley Shine Pro &nbsp;|&nbsp; '+BIZ.phone+' &nbsp;|&nbsp; '+BIZ.email+' &nbsp;|&nbsp; '+BIZ.website+'</div>'+
  '</div></body></html>';
  const w=window.open('','_blank');
  if(!w){alert('Allow popups to save PDF');return;}
  w.document.write(html);w.document.close();
  w.onload=()=>{w.focus();w.print();};
}

function doClear(){
  if(!confirm('Clear this bid?'))return;
  SVCS.forEach(s=>{S[s.id]={on:false,price:s.price,cnt:s.cnt};});
  ['c-name','c-phone','c-addr','c-email','inv-notes'].forEach(id=>{const e=document.getElementById(id);if(e)e.value='';});
  document.getElementById('inv-num').value='1001';
  document.getElementById('h-num').textContent='1001';
  build();
}

// Init
const today=new Date().toISOString().slice(0,10);
document.getElementById('inv-date').value=today;
document.getElementById('h-date').textContent=new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
build();
</script>
